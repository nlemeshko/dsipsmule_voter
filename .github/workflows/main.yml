name: DSIPSMULE-VOTER

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate app syntax
        run: node -c app.js

      - name: Bump version and push tag
        id: tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.new_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' '${{ secrets.KUBE_CONFIG_B64 }}' | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy to Kubernetes
        run: |
          helm upgrade --install dsipsmule-voter ./helm/dsipsmule-voter \
            --namespace dsipsmule-voter \
            --create-namespace \
            --values ./helm/dsipsmule-voter/values.yaml \
            --set-string image.repository=ghcr.io/${{ github.repository }} \
            --set-string image.tag=${{ needs.build.outputs.new_tag }} \
            --set-string app.sessionSecret=${{ secrets.APP_SESSION_SECRET }} \
            --set-string app.telegramBotUsername=${{ secrets.APP_TELEGRAM_BOT_USERNAME }} \
            --set-string app.telegramBotToken=${{ secrets.APP_TELEGRAM_BOT_TOKEN }} \
            --set-string app.adminUsername=${{ secrets.APP_ADMIN_USERNAME }} \
            --set-string app.adminPassword=${{ secrets.APP_ADMIN_PASSWORD }}

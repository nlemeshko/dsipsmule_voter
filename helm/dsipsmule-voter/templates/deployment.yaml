apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dsipsmule-voter.fullname" . }}
  labels:
    {{- include "dsipsmule-voter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dsipsmule-voter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "dsipsmule-voter.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "dsipsmule-voter.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: voter
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.app.port | quote }}
            - name: BASE_URL
              value: {{ .Values.app.baseUrl | quote }}
            - name: DB_PATH
              value: {{ .Values.app.storage.dbPath | quote }}
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "dsipsmule-voter.fullname" . }}-env
                  key: SESSION_SECRET
            - name: TELEGRAM_BOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "dsipsmule-voter.fullname" . }}-env
                  key: TELEGRAM_BOT_USERNAME
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "dsipsmule-voter.fullname" . }}-env
                  key: TELEGRAM_BOT_TOKEN
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "dsipsmule-voter.fullname" . }}-env
                  key: ADMIN_USERNAME
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dsipsmule-voter.fullname" . }}-env
                  key: ADMIN_PASSWORD
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.app.storage.enabled }}
            - name: data
              mountPath: {{ .Values.app.storage.mountPath }}
            {{- end }}
      volumes:
        {{- if .Values.app.storage.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "dsipsmule-voter.fullname" . }}-pvc
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

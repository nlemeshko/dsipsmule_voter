replicaCount: 1

image:
  repository: ghcr.io/nlemeshko/dsipsmule-voter
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 10001

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: vote.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

app:
  port: 3000
  baseUrl: https://vote.example.com
  sessionSecret: change-me-session-secret
  telegramBotUsername: dsipsmule_bot
  telegramBotToken: change-me-bot-token
  adminUsername: admin
  adminPassword: change-me
  storage:
    enabled: true
    size: 1Gi
    storageClass: ""
    accessMode: ReadWriteOnce
    mountPath: /app/storage
    dbPath: /app/storage/voting.sqlite
